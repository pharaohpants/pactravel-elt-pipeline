version: 2

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique

  - name: stg_aircrafts
    columns:
      - name: aircraft_id
        tests:
          - not_null
          - unique

  - name: stg_airlines
    columns:
      - name: airline_id
        tests:
          - not_null
          - unique

  - name: stg_airports
    columns:
      - name: airport_id
        tests:
          - not_null
          - unique

  - name: stg_hotel
    columns:
      - name: hotel_id
        tests:
          - not_null
          - unique

  - name: stg_flight_bookings
    columns:
      - name: trip_id
        tests:
          - not_null
      - name: flight_number
        tests:
          - not_null
      - name: seat_number
        tests:
          - not_null
      - name: departure_date
        tests:
          - not_null
      - name: price
        tests:
          - not_null

  - name: stg_hotel_bookings
    columns:
      - name: trip_id
        tests:
          - not_null
          - unique
      - name: check_in_date
        tests:
          - not_null
      - name: check_out_date
        tests:
          - not_null
      - name: price
        tests:
          - not_null
