version: 2

models:
  - name: dim_date
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: full_date
        tests:
          - not_null
          - unique

  - name: dim_customers
    columns:
      - name: customer_sk
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

  - name: dim_aircrafts
    columns:
      - name: aircraft_id
        tests:
          - not_null
          - unique

  - name: dim_airlines
    columns:
      - name: airline_id
        tests:
          - not_null
          - unique

  - name: dim_airports
    columns:
      - name: airport_id
        tests:
          - not_null
          - unique

  - name: dim_hotel
    columns:
      - name: hotel_id
        tests:
          - not_null
          - unique
