
name: "pactravel_dwh"
version: "1.0.0"
config-version: 2

profile: "pactravel_dwh"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  pactravel_dwh:
    staging:
      +materialized: view
      +schema: staging
    dimension:
      +materialized: table
      +schema: final
      +on_schema_change: fail
    fact:
      +materialized: incremental
      +schema: final
      +on_schema_change: fail
